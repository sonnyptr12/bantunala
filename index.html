<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyWork Ultimate</title>

  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="authBox" class="auth-container">

  <div class="auth-card">
    <h1>⚡ MyWork</h1>
    <p class="subtitle">Sign in to continue</p>

    <input id="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Password"/>

    <button onclick="login()">Login</button>

    <p id="msg"></p>
  </div>

</div>

<!-- ================= APP ================= -->
<div id="app" class="layout" style="display:none;">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>⚡ MyWork</h2>
    <p class="small">Task Manager</p>

    <div class="menu">
      <div class="menu-item active">📋 Tasks</div>
      <div class="menu-item">📊 Dashboard</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <h1>Dashboard</h1>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="task-box">
      <input id="taskInput" placeholder="Tulis task baru..."/>
      <button onclick="addTask()">+ Add</button>
    </div>

    <div id="taskList"></div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
