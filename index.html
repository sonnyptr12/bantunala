<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyWork Pro</title>

  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<!-- ================= AUTH ================= -->
<section id="authBox" class="auth">
  <div class="auth-card">

    <h1>⚡ MyWork</h1>
    <p id="authTitle">Login ke akun kamu</p>

    <input id="fullName" placeholder="Nama Lengkap" style="display:none;"/>
    <input id="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Password"/>

    <button onclick="handleAuth()" id="authBtn">Login</button>

    <p id="msg"></p>

    <p class="toggle">
      <span id="toggleText">Belum punya akun?</span>
      <a href="#" onclick="toggleMode(event)">
        <span id="toggleAction">Daftar</span>
      </a>
    </p>

  </div>
</section>

<!-- ================= DASHBOARD ================= -->
<section id="app" class="app" style="display:none;">

  <div class="topbar">
    <h2>Dashboard MyWork</h2>
    <button onclick="logout()" class="logout">Logout</button>
  </div>

  <div class="task-input">
    <input id="taskInput" placeholder="Tambah task baru..."/>
    <button onclick="addTask()">Tambah</button>
  </div>

  <div id="taskList" class="task-list"></div>

</section>

<script src="script.js"></script>

</body>
</html>
