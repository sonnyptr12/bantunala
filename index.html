<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyWork Pro</title>

  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<!-- ================= LOGIN ================= -->
<section id="authBox" class="auth">
  <div class="auth-card">
    <h1>MyWork</h1>
    <p>Sign in to continue</p>

    <input id="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Password"/>

    <button onclick="login()">Login</button>

    <p id="msg"></p>
  </div>
</section>

<!-- ================= APP ================= -->
<section id="app" class="app" style="display:none;">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">⚡ MyWork</div>

    <nav>
      <div class="nav-item active">📋 Tasks</div>
      <div class="nav-item">📊 Overview</div>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <header class="topbar">
      <h2>Tasks</h2>
      <button onclick="logout()" class="logout">Logout</button>
    </header>

    <div class="task-input">
      <input id="taskInput" placeholder="Tambah task baru..."/>
      <button onclick="addTask()">Tambah</button>
    </div>

    <div id="taskList" class="task-list"></div>

  </main>

</section>

<script src="script.js"></script>

</body>
</html>
