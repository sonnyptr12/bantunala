<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MyWork SaaS Pro</title>

<link rel="stylesheet" href="style.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- AUTH -->
<section id="authBox" class="auth">
  <div class="auth-card">
    <h1>⚡ MyWork</h1>

    <input id="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Password"/>

    <button onclick="login()">Login</button>

    <p id="msg"></p>
  </div>
</section>

<!-- APP -->
<section id="app" class="app" style="display:none;">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="brand">⚡ MyWork</div>

  <button class="menu active" onclick="openPage('dashboard')">📊 Dashboard</button>
  <button class="menu" onclick="openPage('tasks')">📋 Tasks</button>
  <button class="menu" onclick="openPage('users')">👥 Users</button>
  <button class="menu" onclick="openPage('pdf')">📄 PDF Tools</button>
  <button class="menu" onclick="openPage('certificate')">🎓 Sertifikat</button>

  <button class="logout" onclick="logout()">🚪 Logout</button>
</aside>

<!-- MAIN -->
<main class="main">

<!-- TOPBAR -->
<div class="topbar">
  <div>
    <h1 id="greeting">Hello</h1>
    <p id="datetime"></p>
  </div>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard" class="page">

  <div class="grid">

    <div class="card" onclick="openPage('tasks')">📋 Tasks <h2 id="totalTask">0</h2></div>
    <div class="card" onclick="openPage('users')">👥 Users <h2>Online</h2></div>
    <div class="card">✅ Done <h2 id="doneTask">0</h2></div>
    <div class="card">⏳ Pending <h2 id="pendingTask">0</h2></div>

  </div>

  <!-- CHARTS -->
  <div class="chart-grid">

    <div class="chart-card">
      <h3>📊 Task Overview</h3>
      <div class="chart-wrapper">
        <canvas id="chart1"></canvas>
      </div>
    </div>

    <div class="chart-card">
      <h3>📈 Activity</h3>
      <div class="chart-wrapper">
        <canvas id="chart2"></canvas>
      </div>
    </div>

  </div>

</div>

<!-- TASK -->
<div id="tasks" class="page hidden">

  <h2>📋 Task Manager</h2>

  <div class="input">
    <input id="taskInput" placeholder="Tambah task"/>
    <button onclick="addTask()">➕ Add</button>
  </div>

  <div id="taskList"></div>

</div>

<!-- USERS -->
<div id="users" class="page hidden">

  <h2>👥 Online Users</h2>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>User</th>
          <th>Status</th>
          <th>Last Active</th>
        </tr>
      </thead>
      <tbody id="userTable"></tbody>
    </table>
  </div>

</div>

<!-- PDF -->
<div id="pdf" class="page hidden">
  <h2>📄 PDF Tools</h2>

  <div class="card">
    <button>Merge PDF</button>
    <button>Compress</button>
    <button>Convert</button>
  </div>
</div>

<!-- CERTIFICATE -->
<div id="certificate" class="page hidden">

  <h2>🎓 Sertifikat Generator</h2>

  <div class="card">
    <input placeholder="Nama Peserta"/>
    <input placeholder="Judul Sertifikat"/>

    <button>Generate Sertifikat</button>
  </div>

</div>

</main>
</section>

<script src="script.js"></script>
</body>
</html>
