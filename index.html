<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MyWork ERP Pro</title>

<link rel="stylesheet" href="style.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- PDF LIB (REAL ENGINE) -->
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>

<body>

<!-- ================= AUTH ================= -->
<section id="authBox" class="auth">
  <div class="auth-card">

    <h1>⚡ MyWork ERP</h1>
    <p id="authTitle">Login ke sistem</p>

    <input id="fullName" placeholder="Nama Lengkap" style="display:none;"/>
    <input id="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Password"/>

    <button onclick="handleAuth()" id="authBtn">Login</button>

    <p id="msg"></p>

    <p class="toggle">
      <a href="#" onclick="toggleMode(event)">Login / Register</a>
    </p>

  </div>
</section>

<!-- ================= APP ================= -->
<section id="app" class="app" style="display:none;">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="brand">⚡ MyWork</div>

    <button class="menu-item active" onclick="showPage('dashboard')">📊 Dashboard</button>
    <button class="menu-item" onclick="showPage('tasks')">📋 Tasks</button>
    <button class="menu-item" onclick="showPage('notes')">📝 Notes</button>
    <button class="menu-item" onclick="showPage('announce')">📢 Announcement</button>
    <button class="menu-item" onclick="showPage('pdf')">📄 PDF Tools</button>

    <button class="logout" onclick="logout()">Logout</button>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- DASHBOARD -->
    <div id="page-dashboard" class="page">
      <h1>Dashboard</h1>

      <div class="grid">

        <div class="card">Total Task <p id="totalTask">0</p></div>
        <div class="card">Done <p id="doneTask">0</p></div>
        <div class="card">Pending <p id="pendingTask">0</p></div>
        <div class="card accent">Status <p>ONLINE ⚡</p></div>

      </div>
    </div>

    <!-- TASK -->
    <div id="page-tasks" class="page hidden">
      <h2>Tasks</h2>

      <div class="task-input">
        <input id="taskInput" placeholder="Tambah task"/>
        <button onclick="addTask()">Tambah</button>
      </div>

      <div id="taskList"></div>
    </div>

    <!-- NOTES -->
    <div id="page-notes" class="page hidden">
      <h2>Notes</h2>

      <div class="task-input">
        <input id="noteInput" placeholder="Catatan"/>
        <button onclick="addNote()">Add</button>
      </div>

      <div id="noteList"></div>
    </div>

    <!-- ANNOUNCE -->
    <div id="page-announce" class="page hidden">
      <h2>Announcement</h2>

      <div class="task-input">
        <input id="announceInput" placeholder="Pengumuman"/>
        <button onclick="addAnnouncement()">Post</button>
      </div>

      <div id="announceList"></div>
    </div>

    <!-- PDF TOOLS -->
    <div id="page-pdf" class="page hidden">
      <h2>PDF Tools</h2>

      <div class="pdf-box">

        <input type="file" id="pdfInput" multiple accept="application/pdf"/>

        <div class="pdf-actions">
          <button onclick="mergePDF()">Merge</button>
          <button onclick="splitPDF()">Split</button>
        </div>

        <div id="pdfList"></div>

        <div class="progress">
          <div id="progressBar"></div>
        </div>

      </div>
    </div>

  </main>
</section>

<script src="script.js"></script>
</body>
</html>
