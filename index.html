<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyWork Pro Bantunala</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
  <div class="logo">MyWork Pro</div>
</header>

<section class="hero">
  <h1>Work Management System</h1>
  <p>Login untuk mengakses task management</p>
</section>

<!-- LOGIN -->
<div id="authBox" class="auth">
  <h2>Login MyWork</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- APP -->
<div id="app" style="display:none;" class="section">

  <h2>Dashboard Task</h2>

  <div class="add-box">
    <input id="taskInput" placeholder="Tugas baru">
    <button onclick="addTask()">Tambah</button>
  </div>

  <div id="taskList"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="script.js"></script>

</body>
</html>
