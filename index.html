<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MyWork Enterprise</title>

<link rel="stylesheet" href="style.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- AUTH -->
<section id="authBox" class="auth">
  <div class="auth-card">
    <h1>⚡ MyWork</h1>

    <input id="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Password"/>

    <button onclick="login()">Login</button>
    <p id="msg"></p>
  </div>
</section>

<!-- APP -->
<section id="app" class="app" style="display:none;">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="brand">⚡ MyWork</div>

  <button class="menu active" onclick="openPage('dashboard',this)">📊 Dashboard</button>
  <button class="menu" onclick="openPage('tasks',this)">📋 Tasks</button>
  <button class="menu" onclick="openPage('certificate',this)">🎓 Certificate</button>
  <button class="menu" onclick="openPage('pdf',this)">📄 PDF Tools</button>
  <button class="menu" onclick="openPage('users',this)">👥 Users</button>

  <button class="logout" onclick="logout()">🚪 Logout</button>
</aside>

<!-- MAIN -->
<main class="main">

<!-- TOPBAR -->
<div class="topbar">
  <div>
    <h2 id="greeting">Hello</h2>
    <p id="time"></p>
  </div>
</div>

<!-- ================= DASHBOARD ================= -->
<section id="dashboard" class="page active">

<!-- BROADCAST -->
<div class="broadcast">
  📢 <input id="broadcastInput" placeholder="Broadcast message..."/>
  <button onclick="sendBroadcast()">Send</button>
</div>

<!-- CARDS -->
<div class="grid">
  <div class="card">📋 Tasks <h2 id="totalTask">0</h2></div>
  <div class="card">✅ Done <h2 id="doneTask">0</h2></div>
  <div class="card">⏳ Pending <h2 id="pendingTask">0</h2></div>
  <div class="card">👥 Users <h2>Live</h2></div>
</div>

<!-- CHARTS -->
<div class="chart-grid">

  <div class="chart-card">
    <h3>Task Overview</h3>
    <div class="chart-wrap">
      <canvas id="chart1"></canvas>
    </div>
  </div>

  <div class="chart-card">
    <h3>Activity</h3>
    <div class="chart-wrap">
      <canvas id="chart2"></canvas>
    </div>
  </div>

</div>

<!-- TASK TABLE -->
<div class="table-box">
  <h3>Task List</h3>
  <table>
    <thead>
      <tr>
        <th>Title</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="taskTable"></tbody>
  </table>
</div>

</section>

<!-- ================= TASK PAGE ================= -->
<section id="tasks" class="page hidden">
  <h2>Tasks</h2>
  <div class="task-board" id="taskBoard"></div>
</section>

<!-- ================= CERTIFICATE ================= -->
<section id="certificate" class="page hidden">
  <h2>Certificate Generator</h2>

  <div class="card">
    <input placeholder="Nama"/>
    <input placeholder="Event"/>
    <button>Generate</button>
  </div>
</section>

<!-- ================= PDF ================= -->
<section id="pdf" class="page hidden">
  <h2>PDF Tools</h2>

  <div class="tool-grid">
    <div class="tool">Merge PDF</div>
    <div class="tool">Split PDF</div>
    <div class="tool">Compress</div>
  </div>
</section>

<!-- ================= USERS ================= -->
<section id="users" class="page hidden">
  <h2>Online Users</h2>
  <div id="userList"></div>
</section>

</main>
</section>

<script src="script.js"></script>
</body>
</html>
