<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyWork Tech Dashboard</title>

  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<!-- ================= AUTH ================= -->
<section id="authBox" class="auth">
  <div class="auth-card">
    <div class="logo">⚡ MyWork</div>
    <p class="subtitle">Secure Tech Workspace</p>

    <input id="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Password"/>

    <button onclick="handleAuth()">Continue</button>

    <p id="msg"></p>
  </div>
</section>

<!-- ================= DASHBOARD ================= -->
<section id="app" class="app" style="display:none;">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="brand">
      ⚡ MyWork
      <span>v2.0</span>
    </div>

    <div class="menu">

      <button class="menu-item active">
        📊 Dashboard
      </button>

      <button class="menu-item">
        📋 Tasks
      </button>

      <button class="menu-item">
        📈 Analytics
      </button>

      <button class="menu-item">
        ⚙ Settings
      </button>

    </div>

    <div class="sidebar-footer">
      <button onclick="logout()" class="logout">Logout</button>
    </div>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOPBAR -->
    <header class="topbar">

      <div>
        <h1>Dashboard</h1>
        <p>Welcome back, manage your workspace</p>
      </div>

      <div class="user-box">
        <div class="avatar">U</div>
      </div>

    </header>

    <!-- STATS -->
    <section class="grid">

      <div class="card glow">
        <h3>Total Tasks</h3>
        <p id="totalTask">0</p>
      </div>

      <div class="card">
        <h3>Completed</h3>
        <p id="doneTask">0</p>
      </div>

      <div class="card">
        <h3>Pending</h3>
        <p id="pendingTask">0</p>
      </div>

      <div class="card accent">
        <h3>System</h3>
        <p>Online ⚡</p>
      </div>

    </section>

    <!-- TASK PANEL -->
    <section class="panel">

      <div class="panel-header">
        <h2>Task Manager</h2>

        <div class="actions">
          <input id="taskInput" placeholder="Create new task..."/>
          <button onclick="addTask()">Add</button>
        </div>

      </div>

      <div id="taskList" class="task-list"></div>

    </section>

  </main>

</section>

<script src="script.js"></script>

</body>
</html>
