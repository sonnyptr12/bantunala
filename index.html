<!DOCTYPE html>
<html lang="id">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyWork Pro Bantunala</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
  <div class="logo">MyWork Pro</div>
</header>

<section class="hero">

  <div id="taskList"></div>

<script src="script.js"></script>
</body>
</html>
